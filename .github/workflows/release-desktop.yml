# Build signed-ready desktop installers for macOS (DMG/zip) and Windows (NSIS .exe).
# Trigger: push a version tag, e.g. git tag v1.0.0 && git push origin v1.0.0
#
# Requires sibling checkouts at build time:
#   llama-cpp-pro  → ../llama-cpp-pro  (file: dependency)
#   pack-it-pkc    → ./ref-code/pack-it-pkc

name: Release desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Platforms to build'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - mac
          - win

permissions:
  contents: write

jobs:
  mac:
    if: >-
      github.event_name == 'push' ||
      inputs.platforms == 'both' ||
      inputs.platforms == 'mac'
    runs-on: macos-14
    steps:
      - name: Checkout PKC
        uses: actions/checkout@v4
        with:
          path: pkc

      - name: Checkout llama-cpp-pro
        uses: actions/checkout@v4
        with:
          repository: arusatech/llama-cpp-pro
          path: llama-cpp-pro
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Checkout pack-it-pkc
        uses: actions/checkout@v4
        with:
          repository: arusatech/pack-it-pkc
          path: pkc/ref-code/pack-it-pkc
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            pkc/package-lock.json
            pkc/electron/package-lock.json
            llama-cpp-pro/package-lock.json
            pkc/ref-code/pack-it-pkc/package-lock.json

      - name: Install pack-it-pkc
        working-directory: pkc/ref-code/pack-it-pkc
        run: npm ci && npm run build

      - name: Install llama-cpp-pro + build sidecar (arm64 + x64)
        working-directory: llama-cpp-pro
        run: |
          npm ci
          npm run build:js
          npm run build:sidecar:universal
          npm run stage:desktop
          npm run verify:desktop:bundle -- --arch=universal

      - name: Install PKC + Electron
        working-directory: pkc
        run: |
          npm ci
          npm install --prefix electron

      - name: Build macOS release
        working-directory: pkc
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run release:mac

      - name: Upload mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pkc-mac
          path: |
            pkc/electron/release/*.dmg
            pkc/electron/release/*.zip
            pkc/electron/release/latest-mac.yml
          if-no-files-found: error

  win:
    if: >-
      github.event_name == 'push' ||
      inputs.platforms == 'both' ||
      inputs.platforms == 'win'
    runs-on: windows-latest
    steps:
      - name: Checkout PKC
        uses: actions/checkout@v4
        with:
          path: pkc

      - name: Checkout llama-cpp-pro
        uses: actions/checkout@v4
        with:
          repository: arusatech/llama-cpp-pro
          path: llama-cpp-pro
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Checkout pack-it-pkc
        uses: actions/checkout@v4
        with:
          repository: arusatech/pack-it-pkc
          path: pkc/ref-code/pack-it-pkc
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            pkc/package-lock.json
            pkc/electron/package-lock.json
            llama-cpp-pro/package-lock.json
            pkc/ref-code/pack-it-pkc/package-lock.json

      - name: Install pack-it-pkc
        working-directory: pkc/ref-code/pack-it-pkc
        run: npm ci && npm run build

      - name: Install llama-cpp-pro + build Windows sidecar
        working-directory: llama-cpp-pro
        shell: cmd
        run: |
          npm ci
          npm run build:js
          call npm run build:sidecar:win
          npm run stage:desktop
          npm run verify:desktop:bundle -- --platform=win32

      - name: Install PKC + Electron
        working-directory: pkc
        run: |
          npm ci
          npm install --prefix electron

      - name: Build Windows release
        working-directory: pkc
        run: npm run release:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pkc-win
          path: |
            pkc/electron/release/*-setup.exe
            pkc/electron/release/*.exe
            pkc/electron/release/latest.yml
          if-no-files-found: error

  publish:
    needs: [mac, win]
    if: >-
      always() &&
      startsWith(github.ref, 'refs/tags/v') &&
      (needs.mac.result == 'success' || needs.mac.result == 'skipped') &&
      (needs.win.result == 'success' || needs.win.result == 'skipped') &&
      (needs.mac.result == 'success' || needs.win.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Download mac artifacts
        if: needs.mac.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: pkc-mac
          path: dist

      - name: Download win artifacts
        if: needs.win.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: pkc-win
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
